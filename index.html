<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Showdown - Pro Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="bg-animated" aria-hidden="true"></div>

    <div id="loader" class="loader-overlay" style="display: none;">
        <div class="spinner"></div>
        <h2>ANALYSE TÉLÉMÉTRIQUE...</h2>
    </div>

    <header>
        <h1>F1 <span>SHOWDOWN</span></h1>
        <p>Comparaison Historique & Technique</p>
    </header>

    <main>
        <section class="circuit-area">
            <div class="circuit-card">
                <label>📍 CHOIX DU TRACÉ</label>
                <select id="select-circuit"></select>
            </div>
        </section>

        <section class="selection-area">
            <div class="selector-card">
                <label>MONOPLACE 1</label>
                <select id="select-year1" class="year-select" onchange="filterCarsBySlot(1)"></select>
                <div class="image-preview" id="preview1"><img src="images/f1-logo.png" alt=""></div>
                <select id="select1" class="car-select" onchange="updatePreview(1)"></select>
            </div>
            <div class="selector-card">
                <label>MONOPLACE 2</label>
                <select id="select-year2" class="year-select" onchange="filterCarsBySlot(2)"></select>
                <div class="image-preview" id="preview2"><img src="images/f1-logo.png" alt=""></div>
                <select id="select2" class="car-select" onchange="updatePreview(2)"></select>
            </div>
            <div class="selector-card">
                <label>MONOPLACE 3</label>
                <select id="select-year3" class="year-select" onchange="filterCarsBySlot(3)"></select>
                <div class="image-preview" id="preview3"><img src="images/f1-logo.png" alt=""></div>
                <select id="select3" class="car-select" onchange="updatePreview(3)"></select>
            </div>
        </section>

        <div class="action-zone">
            <button id="btn-compare" onclick="preparerComparaison()">LANCER LE DUEL</button>
            <button id="btn-reset" onclick="resetAll()">RESET</button>
        </div>

        <section id="winner-zone"></section>
        <section id="comparison-grid" class="comparison-grid"></section>

        <section id="chart-zone" class="chart-zone" style="display: none;">
            <canvas id="radarChart"></canvas>
        </section>

        <section id="duel-history-section" class="duel-history-section" aria-label="Historique des duels">
            <h2 class="duel-history-title">Historique des duels</h2>
            <p class="duel-history-hint">Les derniers résultats sont enregistrés sur cet appareil.</p>
            <div id="duel-history-list" class="duel-history-list"></div>
            <button type="button" id="btn-clear-history" class="btn-clear-history">Vider l’historique</button>
        </section>
    </main>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
